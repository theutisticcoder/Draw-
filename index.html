<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oil Studio – Realistic Painting App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #2a2a2e 0%, #1a1a1e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
        }

        .studio-container {
            display: grid;
            grid-template-columns: 1fr 300px 350px;
            gap: 20px;
            height: calc(100vh - 40px);
        }

        .canvas-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        .canvas-title {
            font-size: 20px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #c4a87c;
            font-weight: bold;
        }

        #canvas {
            flex: 1;
            border: 8px solid #5a4a3a;
            border-radius: 2px;
            cursor: crosshair;
            background: linear-gradient(135deg, #f5f1ed 0%, #efe9e3 100%);
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.3), 0 8px 24px rgba(0, 0, 0, 0.5);
            display: block;
        }

        .brush-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow-y: auto;
        }

        .palette-section {
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow-y: auto;
        }

        .panel-title {
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #c4a87c;
            font-weight: bold;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .control-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #a0a0a0;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: linear-gradient(90deg, #4a4a4e 0%, #6a6a6e 100%);
            outline: none;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #c4a87c;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
        }

        input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #c4a87c;
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
        }

        .brush-selector {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .brush-btn, .btn, .add-color-btn {
            padding: 10px;
            border: 1px solid rgba(196, 168, 124, 0.3);
            background: rgba(196, 168, 124, 0.1);
            color: #c4a87c;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: Georgia, serif;
        }

        .brush-btn:hover, .btn:hover, .add-color-btn:hover {
            background: rgba(196, 168, 124, 0.2);
            border-color: #c4a87c;
        }

        .brush-btn.active {
            background: #c4a87c;
            color: #1a1a1e;
        }

        .canvas-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .undo-redo {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .color-display {
            width: 100%;
            height: 70px;
            border: 2px solid rgba(196, 168, 124, 0.5);
            border-radius: 4px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: rgba(0, 0, 0, 0.7);
            font-weight: 600;
        }

        .color-palette-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            background: rgba(0, 0, 0, 0.2);
            padding: 10px;
            border-radius: 4px;
            border: 1px solid rgba(196, 168, 124, 0.2);
        }

        .palette-color {
            width: 100%;
            aspect-ratio: 1;
            border: 2px solid rgba(196, 168, 124, 0.3);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.3);
        }

        .palette-color:hover {
            transform: scale(1.05);
            border-color: #c4a87c;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.3), 0 0 8px rgba(196, 168, 124, 0.3);
        }

        .palette-color.active::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
        }

        input[type="color"] {
            width: 50px;
            height: 40px;
            border: 1px solid rgba(196, 168, 124, 0.3);
            border-radius: 4px;
            cursor: pointer;
        }

        .custom-color-input {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .add-color-btn {
            flex: 1;
        }

        .mixing-info {
            font-size: 10px;
            color: #888;
            padding: 8px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
            border-left: 2px solid rgba(196, 168, 124, 0.3);
            line-height: 1.4;
        }

        .divider {
            height: 1px;
            background: rgba(196, 168, 124, 0.1);
        }

        .value-display {
            font-size: 11px;
            color: #c4a87c;
            text-align: center;
            display: block;
            font-weight: 500;
        }

        @media (max-width: 1400px) {
            .studio-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="studio-container">
        <!-- Canvas -->
        <div class="canvas-section">
            <h1 class="canvas-title">Canvas</h1>
            <canvas id="canvas"></canvas>
            <div class="canvas-controls">
                <button class="btn" id="clearBtn">Clear Canvas</button>
                <button class="btn" id="downloadBtn">Download</button>
            </div>
        </div>

        <!-- Brush Controls -->
        <div class="brush-panel">
            <h2 class="panel-title">Brush</h2>
            
            <div class="brush-selector">
                <button class="brush-btn active" data-brush="round">Round</button>
                <button class="brush-btn" data-brush="flat">Flat</button>
                <button class="brush-btn" data-brush="filbert">Filbert</button>
                <button class="brush-btn" data-brush="fan">Fan</button>
            </div>

            <div class="divider"></div>

            <div class="control-group">
                <label class="control-label">Size</label>
                <input type="range" id="brushSize" min="1" max="100" value="20">
                <span class="value-display" id="sizeOutput">20px</span>
            </div>

            <div class="control-group">
                <label class="control-label">Opacity</label>
                <input type="range" id="opacity" min="0.1" max="1" step="0.05" value="1">
                <span class="value-display" id="opacityOutput">100%</span>
            </div>

            <div class="divider"></div>

            <div class="control-group">
                <label class="control-label">Hardness</label>
                <input type="range" id="hardness" min="0" max="1" step="0.1" value="0.7">
                <span class="value-display" id="hardnessOutput">70%</span>
            </div>

            <div class="undo-redo">
                <button class="btn" id="undoBtn">Undo</button>
                <button class="btn" id="redoBtn">Redo</button>
            </div>
        </div>

        <!-- Palette -->
        <div class="palette-section">
            <h2 class="panel-title">Palette</h2>

            <div class="color-display" id="colorDisplay">Current: White</div>

            <h3 class="panel-title" style="font-size: 12px; margin: 0;">Colors</h3>
            <div class="color-palette-grid" id="paletteGrid"></div>

            <div class="divider"></div>

            <h3 class="panel-title" style="font-size: 12px; margin: 0;">Add Custom</h3>
            <div class="custom-color-input">
                <input type="color" id="colorPicker" value="#ffffff">
                <button class="add-color-btn" id="addColorBtn">Add</button>
            </div>

            <div class="mixing-info">
                <strong>Mixing:</strong> Click a color, then paint to blend colors naturally on the canvas. Oil paint mixes!
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        
        // Declare all variables first
        let painting = false;
        let currentColor = '#ffffff';
        let brushType = 'round';
        let brushSize = 20;
        let opacity = 1;
        let hardness = 0.7;
        let history = [];
        let historyStep = -1;
        const maxHistory = 50;

        function resizeCanvas() {
            const dpr = window.devicePixelRatio || 1;
            canvas.width = canvas.offsetWidth * dpr;
            canvas.height = canvas.offsetHeight * dpr;
            ctx.scale(dpr, dpr);
            redraw();
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const defaultColors = ['#ffffff', '#000000', '#ff0000', '#ff7f00', '#ffff00', '#00ff00', '#0000ff', '#4b0082', '#9400d3'];
        let paletteColors = [...defaultColors];

        function updatePaletteUI() {
            const grid = document.getElementById('paletteGrid');
            grid.innerHTML = '';
            paletteColors.forEach(function(color) {
                const div = document.createElement('div');
                div.className = 'palette-color';
                div.style.backgroundColor = color;
                if (color === currentColor) div.classList.add('active');
                div.addEventListener('click', function() { selectColor(color); });
                grid.appendChild(div);
            });
        }

        function selectColor(color) {
            currentColor = color;
            document.getElementById('colorDisplay').textContent = 'Current: ' + color.toUpperCase();
            updatePaletteUI();
        }

        function drawBrushStroke(x, y) {
            ctx.save();
            ctx.globalAlpha = opacity;

            if (brushType === 'round') {
                const grad = ctx.createRadialGradient(x, y, 0, x, y, brushSize / 2);
                grad.addColorStop(0, currentColor);
                grad.addColorStop(hardness, currentColor);
                grad.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(x, y, brushSize / 2, 0, Math.PI * 2);
                ctx.fill();
            } else if (brushType === 'flat') {
                ctx.fillStyle = currentColor;
                ctx.fillRect(x - brushSize / 2, y - brushSize / 4, brushSize, brushSize / 2);
            } else if (brushType === 'filbert') {
                const grad2 = ctx.createRadialGradient(x, y, 0, x, y, brushSize / 2);
                grad2.addColorStop(0, currentColor);
                grad2.addColorStop(0.7, currentColor);
                grad2.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = grad2;
                ctx.beginPath();
                ctx.ellipse(x, y, brushSize / 2.2, brushSize / 3, 0, 0, Math.PI * 2);
                ctx.fill();
            } else if (brushType === 'fan') {
                ctx.strokeStyle = currentColor;
                ctx.lineWidth = 1;
                for (let i = 0; i < 8; i++) {
                    const angle = (i / 8) * Math.PI;
                    ctx.beginPath();
                    ctx.moveTo(x, y);
                    ctx.lineTo(x + Math.cos(angle - Math.PI / 2) * brushSize, y + Math.sin(angle - Math.PI / 2) * brushSize);
                    ctx.stroke();
                }
            }
            ctx.restore();
        }

        function saveState() {
            historyStep++;
            if (historyStep < history.length) history.length = historyStep;
            history.push(canvas.toDataURL());
            if (history.length > maxHistory) {
                history.shift();
                historyStep--;
            }
        }

        function redraw() {
            if (historyStep >= 0 && history[historyStep]) {
                const img = new Image();
                img.onload = function() {
                    const dpr = window.devicePixelRatio || 1;
                    ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
                    ctx.drawImage(img, 0, 0);
                };
                img.src = history[historyStep];
            } else {
                const dpr = window.devicePixelRatio || 1;
                ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
                ctx.fillStyle = '#f5f1ed';
                ctx.fillRect(0, 0, canvas.width / dpr, canvas.height / dpr);
            }
        }

        let lastX, lastY;

        canvas.addEventListener('mousedown', function(e) {
            painting = true;
            saveState();
            const rect = canvas.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            lastX = (e.clientX - rect.left) * dpr;
            lastY = (e.clientY - rect.top) * dpr;
        });

        canvas.addEventListener('mousemove', function(e) {
            if (!painting) return;
            const rect = canvas.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            const x = (e.clientX - rect.left) * dpr;
            const y = (e.clientY - rect.top) * dpr;
            const dist = Math.hypot(x - lastX, y - lastY);
            const steps = Math.ceil(dist / 3);
            for (let i = 0; i <= steps; i++) {
                const t = steps ? i / steps : 0;
                const ix = lastX + (x - lastX) * t;
                const iy = lastY + (y - lastY) * t;
                drawBrushStroke(ix, iy);
            }
            lastX = x;
            lastY = y;
        });

        canvas.addEventListener('mouseup', function() {
            painting = false;
        });

        canvas.addEventListener('mouseleave', function() {
            painting = false;
        });

        document.querySelectorAll('.brush-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.brush-btn').forEach(function(b) { b.classList.remove('active'); });
                btn.classList.add('active');
                brushType = btn.dataset.brush;
            });
        });

        document.getElementById('brushSize').addEventListener('input', function(e) {
            brushSize = parseInt(e.target.value);
            document.getElementById('sizeOutput').textContent = brushSize + 'px';
        });

        document.getElementById('opacity').addEventListener('input', function(e) {
            opacity = parseFloat(e.target.value);
            document.getElementById('opacityOutput').textContent = Math.round(opacity * 100) + '%';
        });

        document.getElementById('hardness').addEventListener('input', function(e) {
            hardness = parseFloat(e.target.value);
            document.getElementById('hardnessOutput').textContent = Math.round(hardness * 100) + '%';
        });

        document.getElementById('undoBtn').addEventListener('click', function() {
            if (historyStep > 0) {
                historyStep--;
                redraw();
            }
        });

        document.getElementById('redoBtn').addEventListener('click', function() {
            if (historyStep < history.length - 1) {
                historyStep++;
                redraw();
            }
        });

        document.getElementById('clearBtn').addEventListener('click', function() {
            if (confirm('Clear the canvas?')) {
                history = [];
                historyStep = -1;
                redraw();
            }
        });

        document.getElementById('downloadBtn').addEventListener('click', function() {
            const link = document.createElement('a');
            link.download = 'oil-painting.png';
            link.href = canvas.toDataURL();
            link.click();
        });

        document.getElementById('addColorBtn').addEventListener('click', function() {
            const color = document.getElementById('colorPicker').value;
            if (!paletteColors.includes(color)) {
                paletteColors.push(color);
                updatePaletteUI();
            }
        });

        updatePaletteUI();
        redraw();
    </script>
</body>
</html>
