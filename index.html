<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DrawPaw - Free Drawing Online!</title>
    <link rel="icon" href="Icon.png">
    <style>
        body {
            overflow: hidden;
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: black;
        }

        h1 {
            background: #7F7FD5;
            background: linear-gradient(to right, blue, green, orange);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #drawing-board {
            border: 1px solid black;
            background-color: white;
        }

        .container {
            height: 100%;
            display: flex;
        }

        #toolbar {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            padding: 5px;
            width: 10vw;
            background-color: lightgray;
        }

       

        #toolbar label {
            font-size: 12px;
        }

        #toolbar input {
            width: 100%;
        }

        button {
            overflow: hidden;
        }

        #clear {
            background-color: #1565c0;
            border: none;
            border-radius: 4px;
            color: white;
            padding: 2px;
        }

        #erase {
            background-color: black;
            border: none;
            border-radius: 4px;
            color: white;
            padding: 2px;
        }

        #map {
            rotate: 1 0 0 20deg;
            position: absolute;
            left: 200px;
            top: -800px;
        }

        img {
            overflow: hidden;
        }

        #new {
            color: white;
            background: blue;
            font-size: 50pt;
            width: 100vw;
            height: 10vh;
            position: absolute;
            left: 0px;
        }

        #gallery {
            height: 100vh;
            width: 100vw;
            overflow-y: scroll;
            background: gray;
        }
        #toolbar * {
            margin-bottom: 6px;
            position: relative;
            z-index: 3;
            height: 45px;
            font-size: 15pt;
       }
       h1, label{
        font-size: 30pt;
       }
    </style>
</head>

<body>
    <div id="gallery">
        <button id="new">+</button>
    </div>
    <section class="container">
        <div id="toolbar" hidden>
            <h1 style="font-size: 30pt;">DrawPaw</h1>
            <label style="font-size: 30pt;" for="stroke">Stroke</label>
            <input id="stroke" name='stroke' type="color">
            
            <label style="font-size: 20pt;">Brush Type</label>
            <select id="brushType" style="font-size: 15pt; height: 45px; margin-bottom: 6px;">
                <option value="round">Round</option>
                <option value="square">Square</option>
                <option value="soft">Soft</option>
            </select>
            
            <button id="erase">Eraser</button>
            <label style="font-size: 30pt;" for="lineWidth">Brush Width</label>
            <input id="lineWidth" name='lineWidth' type="number" value="5" min="1" max="50">
            <label style="font-size: 30pt;" for="blendAmount">Blend Amount</label>
            <input id="blendAmount" name='blendAmount' type="range" min="0" max="100" value="70">
            <label style="font-size: 20pt;" for="wetMix">Wet Mix</label>
            <input id="wetMix" name='wetMix' type="range" min="0" max="100" value="50">
            
            <button id="undo">↶ Undo</button>
            <button id="redo">↷ Redo</button>
            <button id="clear">Clear</button>
            <button id="dry">Dry</button>
            <button id="save">Save Image</button>
        </div>
        <div id="map"></div>
        <div class="drawing-board">
            <canvas id="drawing-board"></canvas>
        </div>
    </section>
    <script>
        var arts = [];
        if (localStorage.canvas) {
            arts = JSON.parse(localStorage.getItem("canvas"));
        }

        var isNumber = function isNumber(value) {
            return typeof value === 'number' && isFinite(value);
        }

        var lasttouch = null, touch;
        var number = 1;
        const canvas = document.getElementById('drawing-board');
        const toolbar = document.getElementById('toolbar');
        var points = []
        
        // Undo/Redo History
        var history = [];
        var historyStep = -1;
        
        function saveState() {
            historyStep++;
            if (historyStep < history.length) {
                history.length = historyStep;
            }
            history.push({
                canvas: canvas.toDataURL("image/png"),
                points: JSON.parse(JSON.stringify(points))
            });
            if (history.length > 50) {
                history.shift();
                historyStep--;
            }
        }
        
        function undo() {
            if (historyStep > 0) {
                historyStep--;
                const state = history[historyStep];
                const img = new Image();
                img.onload = () => {
                    ctx.fillStyle = "white";
                    ctx.fillRect(0, 0, canvas.width * 3, canvas.height * 3);
                    ctx.drawImage(img, 150, 0);
                    points = JSON.parse(JSON.stringify(state.points));
                };
                img.src = state.canvas;
            }
        }
        
        function redo() {
            if (historyStep < history.length - 1) {
                historyStep++;
                const state = history[historyStep];
                const img = new Image();
                img.onload = () => {
                    ctx.fillStyle = "white";
                    ctx.fillRect(0, 0, canvas.width * 3, canvas.height * 3);
                    ctx.drawImage(img, 150, 0);
                    points = JSON.parse(JSON.stringify(state.points));
                };
                img.src = state.canvas;
            }
        }
        
        document.querySelector("#dry").onclick = () => {
            points = []
        }
        
        document.querySelector("#undo").onclick = undo;
        document.querySelector("#redo").onclick = redo;
        
        const eraser = document.getElementById('erase');
        const ctx = canvas.getContext('2d');

        const canvasOffsetX = canvas.offsetLeft;
        const canvasOffsetY = canvas.offsetTop;
        var color = "#000000";
        var blendAmount = 70;
        var wetMix = 50;
        var brushType = "round";
        let isPainting = false;
        let lineWidth = 5;

        if (isNumber(localStorage.getItem("lw"))) lineWidth = parseInt(localStorage.getItem("lw"));
        if (localStorage.getItem("color")) color = localStorage.getItem("color");
        if (isNumber(localStorage.getItem("blend"))) blendAmount = parseInt(localStorage.getItem("blend"));
        if (isNumber(localStorage.getItem("wetmix"))) wetMix = parseInt(localStorage.getItem("wetmix"));
        if (localStorage.getItem("brushtype")) brushType = localStorage.getItem("brushtype");

        let startX;
        let startY;
        canvas.height = screen.height * 0.7;
        canvas.width = screen.width * 0.7;
        canvas.style.height = screen.height * 0.7 + "px";
        canvas.style.width = screen.width * 0.7 + "px";
        var isOil = true;
        ctx.translate(-150, 0)
        
        toolbar.addEventListener('click', e => {
            if (e.target.id === 'clear') {
                ctx.fillStyle = "white";
                ctx.fillRect(0, 0, canvas.width * 3, canvas.height * 3);
                points = [];
            }
        });
        
        var draws = 0;
        toolbar.addEventListener('change', e => {
            if (e.target.id === 'stroke') {
                ctx.strokeStyle = e.target.value;
                color = e.target.value;
            }

            if (e.target.id === 'lineWidth') {
                lineWidth = parseInt(e.target.value);
            }

            if (e.target.id === 'blendAmount') {
                blendAmount = parseInt(e.target.value);
            }

            if (e.target.id === 'wetMix') {
                wetMix = parseInt(e.target.value);
            }

            if (e.target.id === 'brushType') {
                brushType = e.target.value;
            }
        });

        function shadeColor(color, amount) {
            return '#' + color.replace(/^#/, '').replace(/../g, color => ('0' + Math.min(255, Math.max(0, parseInt(color, 16) + amount)).toString(16)).substr(-2));
        }

        function lerpColor(color1, color2, amount) {
            const r1 = parseInt(color1.slice(1, 3), 16);
            const g1 = parseInt(color1.slice(3, 5), 16);
            const b1 = parseInt(color1.slice(5, 7), 16);

            const r2 = parseInt(color2.slice(1, 3), 16);
            const g2 = parseInt(color2.slice(3, 5), 16);
            const b2 = parseInt(color2.slice(5, 7), 16);

            const r = Math.round(r1 + amount * (r2 - r1));
            const g = Math.round(g1 + amount * (g2 - g1));
            const b = Math.round(b1 + amount * (b2 - b1));

            return `#${r.toString(16).padStart(2, '0')}${g.toString(16).padStart(2, '0')}${b.toString(16).padStart(2, '0')}`;
        }

        // Find nearest point within threshold distance
        function findNearestPoint(x, y, threshold = 30) {
            let nearest = null;
            let minDist = threshold;
            
            for (let i = points.length - 1; i >= Math.max(0, points.length - 100); i--) {
                const p = points[i];
                const dist = Math.sqrt((p.x - x) ** 2 + (p.y - y) ** 2);
                if (dist < minDist) {
                    minDist = dist;
                    nearest = p;
                }
            }
            return nearest;
        }

        function openDrawing(image, p, num) {
            number = num;
            document.querySelector("#toolbar").hidden = false;
            ctx.drawImage(image, 150, 0, canvas.width, canvas.height);
            points = p;
            document.querySelector("#gallery").hidden = true;
            restore();
        }

        var imgs = 0;
        if (localStorage.getItem("canvas")) {
            arts.forEach(can => {
                
                var i = new Image();
                i.src = can.canvas;
                i.style.background = "white";
                i.style.marginLeft = "13vw";
                i.style.marginTop = "15vh";
                
                i.style.width = canvas.width / 6;
                i.style.height = canvas.height / 6;
                i.style.border = "1px solid black"

                i.onclick = () => {
                    openDrawing(i, can.points, can.number)
                };
                document.getElementById("gallery").appendChild(i);
                imgs++;
                if(imgs % 4 === 0){
                    document.getElementById("gallery").innerHTML += "<br>";
                }
            });
            
        }

        document.getElementById("new").onclick = () => {
            document.querySelector("#toolbar").hidden = false;
            arts.push({ canvas: canvas.toDataURL("image/png"), number: arts.length + 1, points: [] })
            document.querySelector("#gallery").hidden = true;
            number = arts.length;
            restore();
        }

        // Draw oil painting strokes with smooth blending
        function drawOilStroke(fromX, fromY, toX, toY, strokeColor, width) {
            const segments = Math.ceil(Math.hypot(toX - fromX, toY - fromY) / 2);
            
            for (let seg = 0; seg < segments; seg++) {
                const t = segments === 0 ? 0 : seg / segments;
                const x = fromX + (toX - fromX) * t;
                const y = fromY + (toY - fromY) * t;
                
                if (brushType === "round") {
                    // Round brush with circular gradient
                    const gradient = ctx.createRadialGradient(x, y, 0, x, y, width);
                    gradient.addColorStop(0, strokeColor);
                    gradient.addColorStop(0.7, strokeColor + '80');
                    gradient.addColorStop(1, strokeColor + '00');
                    
                    ctx.beginPath();
                    ctx.fillStyle = gradient;
                    ctx.arc(x, y, width, 0, Math.PI * 2);
                    ctx.fill();
                    
                } else if (brushType === "square") {
                    // Square brush
                    ctx.beginPath();
                    ctx.fillStyle = strokeColor;
                    ctx.fillRect(x - width / 2, y - width / 2, width, width);
                    
                } else if (brushType === "soft") {
                    // Soft brush with multiple layers
                    ctx.beginPath();
                    ctx.strokeStyle = strokeColor;
                    ctx.lineWidth = width;
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    ctx.globalAlpha = 0.8;
                    ctx.moveTo(fromX + (toX - fromX) * (Math.max(0, seg - 1) / segments), 
                               fromY + (toY - fromY) * (Math.max(0, seg - 1) / segments));
                    ctx.lineTo(x, y);
                    ctx.stroke();
                    
                    // Shadow layers for depth
                    ctx.beginPath();
                    ctx.strokeStyle = shadeColor(strokeColor, -15);
                    ctx.lineWidth = width * 0.6;
                    ctx.globalAlpha = 0.5;
                    ctx.moveTo(x - width * 0.3, y);
                    ctx.lineTo(x + width * 0.3, y);
                    ctx.stroke();
                    
                    // Highlight layers for dimension
                    ctx.beginPath();
                    ctx.strokeStyle = shadeColor(strokeColor, 15);
                    ctx.lineWidth = width * 0.4;
                    ctx.globalAlpha = 0.4;
                    ctx.moveTo(x - width * 0.2, y - width * 0.2);
                    ctx.lineTo(x + width * 0.2, y + width * 0.2);
                    ctx.stroke();
                }
            }
            
            ctx.globalAlpha = 1.0;
        }

        const draw = (e) => {
            if (!isPainting) {
                return;
            }

            if (isOil) {
                const blendRatio = blendAmount / 100;
                const wetRatio = wetMix / 100;
                const nearestPoint = findNearestPoint(e.clientX, e.clientY, 50);
                
                // Calculate blended color with wet mix
                let blendedColor = color;
                if (nearestPoint && Math.random() < wetRatio) {
                    blendedColor = lerpColor(color, nearestPoint.color, blendRatio);
                }
                
                points.push({ 
                    color: blendedColor, 
                    x: e.clientX, 
                    y: e.clientY 
                });
                
                if (lasttouch) {
                    drawOilStroke(lasttouch.clientX, lasttouch.clientY, 
                                 e.clientX, e.clientY, blendedColor, lineWidth);
                }
                
                lasttouch = { clientX: e.clientX, clientY: e.clientY };
            } else {
                ctx.lineWidth = lineWidth;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.lineTo(e.clientX, e.clientY);
                ctx.stroke();
            }
        }

        const draw2 = (e) => {
            if (!isPainting) {
                return;
            }

            if (isOil) {
                const blendRatio = blendAmount / 100;
                const wetRatio = wetMix / 100;
                const nearestPoint = findNearestPoint(e.touches[0].clientX, e.touches[0].clientY, 50);
                
                let blendedColor = color;
                if (nearestPoint && Math.random() < wetRatio) {
                    blendedColor = lerpColor(color, nearestPoint.color, blendRatio);
                }
                
                points.push({ 
                    color: blendedColor, 
                    x: e.touches[0].clientX, 
                    y: e.touches[0].clientY 
                });
                
                if (lasttouch) {
                    drawOilStroke(lasttouch.clientX, lasttouch.clientY, 
                                 e.touches[0].clientX, e.touches[0].clientY, blendedColor, lineWidth);
                }
                
                lasttouch = { 
                    clientX: e.touches[0].clientX, 
                    clientY: e.touches[0].clientY 
                };
            } else {
                ctx.lineWidth = lineWidth;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.lineTo(e.touches[0].clientX, e.touches[0].clientY);
                ctx.stroke();
            }
        }

        canvas.addEventListener('mousedown', (e) => {
            isPainting = true;
            color = document.querySelector("#stroke").value;
            startX = e.clientX;
            startY = e.clientY;
            saveState();
        });

        canvas.addEventListener('mouseup', e => {
            isPainting = false;
            lasttouch = null;
        });

        canvas.addEventListener('touchstart', (e) => {
            isPainting = true;
            color = document.querySelector("#stroke").value;
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
            saveState();
        });

        canvas.addEventListener('touchend', e => {
            isPainting = false;
            lasttouch = null;
        });

        // Keyboard shortcuts: Ctrl+Z for undo, Ctrl+Y for redo
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey || e.metaKey) {
                if (e.key === 'z') {
                    e.preventDefault();
                    undo();
                } else if (e.key === 'y') {
                    e.preventDefault();
                    redo();
                }
            }
        });

        // Touch gesture shortcuts: 3-finger tap for undo, 4-finger tap for redo
        let touchStartCount = 0;
        document.addEventListener('touchstart', (e) => {
            touchStartCount = e.touches.length;
        });

        document.addEventListener('touchend', (e) => {
            if (touchStartCount === 3) {
                undo();
            } else if (touchStartCount === 4) {
                redo();
            }
        });

        canvas.addEventListener('touchmove', draw2);
        canvas.addEventListener('mousemove', draw);

        toolbar.addEventListener('click', e => {
            if (e.target.id === 'erase') {
                eraser.style.backgroundColor = "#b58691";
                ctx.strokeStyle = 'white';
                color = 'white';
            }
            if (e.target.id != 'erase' && eraser.style.backgroundColor === '#b58691') {
                eraser.style.backgroundColor = "black";
                color = document.querySelector("#stroke").value;
                ctx.strokeStyle = color;
            }
        });

        document.querySelector("#save").onclick = () => {
            var image = canvas.toDataURL("image/png").replace("image/png", "image/octet-stream");
            var a = document.createElement("a");
            var name = prompt("Choose a name for your drawing.")
            a.href = image;
            a.download = name + ".png";
            a.click();
        }

        function restore() {
            arts[number - 1].canvas = canvas.toDataURL("image/png");
            arts[number - 1].points = points;
            localStorage.setItem("canvas", JSON.stringify(arts));
            localStorage.setItem("lw", lineWidth);
            localStorage.setItem("blend", blendAmount);
            localStorage.setItem("wetmix", wetMix);
            localStorage.setItem("brushtype", brushType);
            localStorage.setItem("color", color);
            setTimeout(restore, 10)
        }
    </script>
</body>

</html>
