<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pixel Art Generator (labs-lesanstral)</title>
    <style>
        :root {
            --bg-color: #0d0e12;
            --card-bg: #15171e;
            --text-color: #f1f5f9;
            --text-muted: #94a3b8;
            --accent-color: #f43f5e;
            --accent-hover: #e11d48;
            --border-color: #272a37;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 24px;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        header {
            text-align: center;
            width: 100%;
            max-width: 1000px;
        }

        h1 {
            margin: 0 0 8px 0;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.025em;
        }

        p.subtitle {
            color: var(--text-muted);
            margin: 0;
            font-size: 0.95rem;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input, select, textarea {
            background-color: #090a0f;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: #fff;
            padding: 12px;
            font-size: 0.95rem;
            font-family: inherit;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .row-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.15s ease;
            font-size: 0.95rem;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        button:disabled {
            background-color: #334155;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .canvas-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #090a0f;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            min-height: 340px;
            position: relative;
        }

        canvas {
            image-rendering: pixelated;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            background-color: #000;
            max-width: 100%;
        }

        .export-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            margin-top: 12px;
        }

        .export-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn-secondary {
            background-color: #272a37;
            color: var(--text-color);
        }

        .btn-secondary:hover {
            background-color: #373b4e;
        }

        pre {
            background-color: #090a0f;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 0.75rem;
            max-height: 140px;
            overflow-y: auto;
            margin: 0;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .loading-overlay {
            display: none;
            position: absolute;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            background: rgba(13, 14, 18, 0.9);
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            justify-content: center;
            border-radius: 12px;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(244, 63, 94, 0.1);
            border-top: 3px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-message {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <h1>AI Pixel Art Generator</h1>
        <p class="subtitle">Efficient direct RGB pixel matrix engine using labs-lesanstral</p>
    </header>

    <div class="container">
        <!-- Input Form Control Panel -->
        <div class="card">
            <div class="form-group">
                <label for="apiKey">Mistral API Key</label>
                <input type="password" id="apiKey" placeholder="Paste your Mistral API key here" />
            </div>

            <div class="form-group">
                <label for="prompt">Design Prompt</label>
                <textarea id="prompt" rows="3" placeholder="e.g., A minimalist glowing magic potion bottle, retro sprite style"></textarea>
            </div>

            <div class="row-grid">
                <div class="form-group">
                    <label for="widthInput">Width (Pixels)</label>
                    <input type="number" id="widthInput" value="16" min="4" max="64" />
                </div>

                <div class="form-group">
                    <label for="heightInput">Height (Pixels)</label>
                    <input type="number" id="heightInput" value="16" min="4" max="64" />
                </div>
            </div>

            <div class="form-group">
                <label for="dotStyle">Dot Rendering Mode</label>
                <select id="dotStyle">
                    <option value="square">Sharp Pixel Square</option>
                    <option value="circle">Pixelated Circular Dot</option>
                </select>
            </div>

            <button id="generateBtn">Generate RGB Pixels</button>
            <div id="statusText" class="status-message">Ready</div>
        </div>

        <!-- Canvas and Export Control Panel -->
        <div class="card" style="justify-content: space-between;">
            <div class="canvas-container">
                <!-- Native dimensions scaled sharply with CSS -->
                <canvas id="pixelCanvas" width="16" height="16"></canvas>
                
                <div class="loading-overlay" id="loadingOverlay">
                    <div class="spinner"></div>
                    <div id="loadingText">Processing model...</div>
                </div>
            </div>

            <div class="export-section">
                <label>Export Tools</label>
                <div class="export-buttons">
                    <button id="exportPngBtn" class="btn-secondary" disabled>Save PNG</button>
                    <button id="exportJsBtn" class="btn-secondary" disabled>Copy JS Code</button>
                </div>
                <label style="margin-top: 10px;">Output RGB Array [[r,g,b], ...]</label>
                <pre id="jsonOutput">// RGB array will display here...</pre>
            </div>
        </div>
    </div>

    <script>
        // Track the current pixel states
        let currentRgbArray = null;
        let currentWidth = 16;
        let currentHeight = 16;

        // UI references
        const apiKeyInput = document.getElementById('apiKey');
        const promptInput = document.getElementById('prompt');
        const widthInput = document.getElementById('widthInput');
        const heightInput = document.getElementById('heightInput');
        const dotStyleInput = document.getElementById('dotStyle');
        const generateBtn = document.getElementById('generateBtn');
        const exportPngBtn = document.getElementById('exportPngBtn');
        const exportJsBtn = document.getElementById('exportJsBtn');
        const jsonOutput = document.getElementById('jsonOutput');
        const statusText = document.getElementById('statusText');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const canvas = document.getElementById('pixelCanvas');
        const ctx = canvas.getContext('2d');

        // Manage stored API keys in localStorage
        if (localStorage.getItem('mistral_api_key')) {
            apiKeyInput.value = localStorage.getItem('mistral_api_key');
        }
        apiKeyInput.addEventListener('change', () => {
            localStorage.setItem('mistral_api_key', apiKeyInput.value.trim());
        });

        // Dynamic visual scaling for canvas display
        function setupCanvasSize(w, h) {
            canvas.width = w;
            canvas.height = h;
            const maxDisplayDimension = 320;
            const aspectRatio = w / h;
            
            let displayW, displayH;
            if (aspectRatio >= 1) {
                displayW = maxDisplayDimension;
                displayH = maxDisplayDimension / aspectRatio;
            } else {
                displayH = maxDisplayDimension;
                displayW = maxDisplayDimension * aspectRatio;
            }

            canvas.style.width = `${Math.round(displayW)}px`;
            canvas.style.height = `${Math.round(displayH)}px`;
        }
        setupCanvasSize(currentWidth, currentHeight);

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#090a0f';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        clearCanvas();

        // Event hooks
        generateBtn.addEventListener('click', generatePixelArt);
        exportPngBtn.addEventListener('click', exportPNG);
        exportJsBtn.addEventListener('click', copyJsCode);
        
        dotStyleInput.addEventListener('change', () => {
            if (currentRgbArray) {
                renderGrid(currentRgbArray, currentWidth, currentHeight);
            }
        });

        const updateDimensions = () => {
            const w = parseInt(widthInput.value) || 16;
            const h = parseInt(heightInput.value) || 16;
            setupCanvasSize(w, h);
            clearCanvas();
        };

        widthInput.addEventListener('change', updateDimensions);
        heightInput.addEventListener('change', updateDimensions);

        async function generatePixelArt() {
            const apiKey = apiKeyInput.value.trim();
            const prompt = promptInput.value.trim();
            const width = parseInt(widthInput.value) || 16;
            const height = parseInt(heightInput.value) || 16;

            if (!apiKey) {
                alert('Please provide your Mistral API Key.');
                return;
            }
            if (!prompt) {
                alert('Please state what you want to generate.');
                return;
            }

            setLoading(true, "Querying labs-lesanstral model...");
            statusText.textContent = "Negotiating RGB coordinates...";
            setupCanvasSize(width, height);

            const totalPixels = width * height;

            // Strict instructions optimization for labs-lesanstral
            const systemPrompt = `You are an expert retro pixel designer.
You will generate a 1D array representing raw pixel data in RGB format for a grid of size ${width}x${height}.
You must return only JSON matching this schema:
{
  "pixels": [
    [r, g, b], // Pixel index 0 (top-left)
    [r, g, b]  // Pixel index 1 ...
  ]
}

Requirements:
- Your response must consist ONLY of the raw JSON object. Do not wrap in markdown blocks.
- The "pixels" array must have an exact length of ${totalPixels} elements (one [r,g,b] element per pixel).
- Values for r, g, and b must be integers between 0 and 255.
- Create art matching: "${prompt}".`;

            try {
                const response = await fetch('https://api.mistral.ai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "labs-lesanstral",
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user", content: `Create an RGB array of size ${width}x${height} for: "${prompt}"` }
                        ],
                        temperature: 0.15,
                        response_format: { type: "json_object" }
                    })
                });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(errData.error?.message || `API error code: ${response.status}`);
                }

                const data = await response.json();
                const contentText = data.choices[0].message.content.trim();
                const parsedData = JSON.parse(contentText);

                if (!parsedData.pixels || !Array.isArray(parsedData.pixels)) {
                    throw new Error("Returned structure does not contain expected raw 'pixels' array.");
                }

                currentRgbArray = parsedData.pixels;
                currentWidth = width;
                currentHeight = height;

                jsonOutput.textContent = JSON.stringify(parsedData.pixels);
                renderGrid(parsedData.pixels, width, height);

                exportPngBtn.disabled = false;
                exportJsBtn.disabled = false;
                statusText.textContent = "Data array generated.";

            } catch (error) {
                console.error(error);
                statusText.textContent = `Error: ${error.message}`;
                alert(`Error encountered: ${error.message}`);
            } finally {
                setLoading(false);
            }
        }

        // Render standard flat 1D RGB array onto canvas coordinate pixels
        function renderGrid(pixels, width, height) {
            const renderingStyle = dotStyleInput.value;
            
            clearCanvas();

            for (let i = 0; i < pixels.length; i++) {
                if (i >= width * height) break;
                
                const r = i % width;
                const c = Math.floor(i / width);
                
                const rgb = pixels[i];
                if (!Array.isArray(rgb) || rgb.length < 3) continue;

                ctx.fillStyle = `rgb(${rgb[0]}, ${rgb[1]}, ${rgb[2]})`;

                if (renderingStyle === 'square') {
                    ctx.fillRect(r, c, 1, 1);
                } else if (renderingStyle === 'circle') {
                    ctx.beginPath();
                    ctx.arc(r + 0.5, c + 0.5, 0.45, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        function setLoading(isLoading, text = "") {
            loadingOverlay.style.display = isLoading ? 'flex' : 'none';
            if (text) loadingText.textContent = text;
            generateBtn.disabled = isLoading;
        }

        // Scale Canvas crisp export
        function exportPNG() {
            const exportScale = 32;
            const offscreen = document.createElement('canvas');
            offscreen.width = canvas.width * exportScale;
            offscreen.height = canvas.height * exportScale;
            const oCtx = offscreen.getContext('2d');

            oCtx.imageSmoothingEnabled = false;
            oCtx.webkitImageSmoothingEnabled = false;
            oCtx.msImageSmoothingEnabled = false;

            oCtx.drawImage(canvas, 0, 0, offscreen.width, offscreen.height);

            const link = document.createElement('a');
            link.download = `pixel-art-${currentWidth}x${currentHeight}.png`;
            link.href = offscreen.toDataURL('image/png');
            link.click();
        }

        // Copy optimized Javascript runner containing dynamic array data
        function copyJsCode() {
            if (!currentRgbArray) return;

            const jsCodeString = `/**
 * Generated RGB Array & Canvas Rendering Engine
 * Dimensions: ${currentWidth}w x ${currentHeight}h
 * Model: labs-lesanstral
 */
const pixelWidth = ${currentWidth};
const pixelHeight = ${currentHeight};
const rgbPixels = ${JSON.stringify(currentRgbArray)};

function drawRGBMatrix(canvasElement, dotStyle = 'square') {
    const ctx = canvasElement.getContext('2d');
    
    // Configure internal canvas dimensions
    canvasElement.width = pixelWidth;
    canvasElement.height = pixelHeight;
    
    ctx.clearRect(0, 0, pixelWidth, pixelHeight);
    
    for (let i = 0; i < rgbPixels.length; i++) {
        const x = i % pixelWidth;
        const y = Math.floor(i / pixelWidth);
        const [r, g, b] = rgbPixels[i];
        
        ctx.fillStyle = \`rgb(\${r},\${g},\${b})\`;
        
        if (dotStyle === 'square') {
            ctx.fillRect(x, y, 1, 1);
        } else {
            ctx.beginPath();
            ctx.arc(x + 0.5, y + 0.5, 0.45, 0, Math.PI * 2);
            ctx.fill();
        }
    }
}`;

            navigator.clipboard.writeText(jsCodeString).then(() => {
                alert('Optimized JavaScript Array and draw function copied to clipboard.');
            }).catch(err => {
                console.error('Failed to copy code: ', err);
            });
        }
    </script>
</body>
</html>
